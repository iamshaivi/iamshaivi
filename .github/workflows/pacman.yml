name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Pacman
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: iamshaivi
          outputs: |
             dist/pacman.svg?color_snake=#FFD700&color_dots=#238636,#2ea043,#3fb950,#56d364,#1a7f37
            
      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
